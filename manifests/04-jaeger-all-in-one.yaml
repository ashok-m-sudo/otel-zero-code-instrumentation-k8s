# Jaeger v2 all-in-one.
#
# `jaegertracing/jaeger:latest` is the OpenTelemetry-Collector-based Jaeger v2
# distribution. Its built-in default configuration:
#   - accepts OTLP on 4317 (gRPC) and 4318 (HTTP)
#   - stores spans in memory (single pod, ephemeral -- fine for a demo)
#   - serves the query UI on 16686
#
# We expose two Services so the names are stable and self-documenting:
#   - jaeger-collector : the OTLP ingest endpoint the OTel Collector forwards to
#                        (jaeger-collector.observability.svc.cluster.local:4318)
#   - jaeger-query     : the UI, reached via `kubectl port-forward` for verification
#
# Storage is in-memory: restarting the pod loses all traces. Production setups
# swap in a persistent backend (e.g. Jaeger v2 + Elasticsearch) -- see the
# ceph-distributed-tracing-jaeger-v2 sibling repo (planned).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: observability
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/jaeger:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: query-ui
              containerPort: 16686
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 20
            periodSeconds: 10
---
# OTLP ingest service. The OTel Collector's otlphttp exporter targets
# jaeger-collector.observability.svc.cluster.local:4318
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: observability
  labels:
    app: jaeger
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
---
# Query UI service. Reach it with:
#   kubectl port-forward svc/jaeger-query 16686:16686 -n observability
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: observability
  labels:
    app: jaeger
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: query-ui
      port: 16686
      targetPort: 16686
      protocol: TCP
